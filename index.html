<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Widget</title>
  </head>
  <body>

    <section
        id="buktor-widget"
        class="buktor-container"
        data-url="https://www.buktor.com"
        data-slug="abateeyehospital"
        data-type="appointment"
        data-lead-id = "123"
        data-location=""
        data-category=""
        data-service=""
        data-patient-name=""
        data-patient-age=""
        data-patient-phone=""
        data-booking-date=""
        data-patient-mrno=""  
        data-date-view="calender"
        data-base-url="https://abateodoo.zinfog.in"
        data-appointment-id=""
        data-appointment-callback-id=""
        data-appointment-details-button=""
        data-otp-required="false"
    ></section>

<script type="text/javascript">
  // 1. Get the URL parameters
  const urlParams = new URLSearchParams(window.location.search);
  
  // 2. Extract the Phone and the Lead ID from the URL
  const phone = urlParams.get('data-patient-phone');
  const leadId = urlParams.get('data-lead-id');

  // 3. Find the Buktor section
  const widgetSection = document.getElementById('buktor-widget');

  if (widgetSection) {
    // Inject Phone if it exists
    if (phone) {
      widgetSection.setAttribute('data-patient-phone', phone.trim());
    }
    // Inject Lead ID if it exists
    if (leadId) {
      widgetSection.setAttribute('data-lead-id', leadId.trim());
    }
  }
</script>
      
    <script
      type="text/javascript"
      src="https://buktor.com/assets/abate-embed.js"
    ></script>

    <script>
      document.addEventListener("Success", function (event) { });
      document.addEventListener("Failed", function (event) { });
      document.addEventListener("Updated", function (event) { });
    </script> 
  </body>
</html>
